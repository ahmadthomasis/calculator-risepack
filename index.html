<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Risepack Calculator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    </style>
    <script>
      // Handle redirect dari 404.html (GitHub Pages SPA fix)
      var redirect = sessionStorage.getItem('redirect')
      if (redirect) {
        sessionStorage.removeItem('redirect')
        // Gunakan replaceState agar back button tetap bekerja normal
        window.history.replaceState(null, null, redirect)
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/calculator-risepack/src/main.jsx"></script>
  </body>
</html>
